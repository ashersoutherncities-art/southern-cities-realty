<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 80" width="350" height="80">
  <defs>
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001f3f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d70;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f25a1a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon badge -->
  <g>
    <!-- Outer circle -->
    <circle cx="35" cy="40" r="30" fill="url(#navyGrad)"/>
    
    <!-- Inner decorative -->
    <circle cx="35" cy="40" r="27" fill="none" stroke="white" stroke-width="1.5" opacity="0.5"/>
    
    <!-- SC monogram in circle -->
    <text x="35" y="48" font-family="serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="1">
      SC
    </text>
  </g>

  <!-- Text -->
  <g>
    <text x="78" y="32" font-family="serif" font-size="26" font-weight="bold" fill="#001f3f">
      Southern
    </text>
    <text x="78" y="57" font-family="serif" font-size="26" font-weight="bold" fill="#001f3f">
      Cities
    </text>
    <text x="260" y="48" font-family="sans-serif" font-size="14" font-weight="600" fill="#ff6b35" letter-spacing="1">
      ENTERPRISES
    </text>
  </g>

  <!-- Accent line -->
  <line x1="78" y1="62" x2="250" y2="62" stroke="url(#orangeGrad)" stroke-width="2"/>
</svg>